spring.application.name=OmniShelf

# ── Server ──────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/omnishelf
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ── JPA ─────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.open-in-view=false

# ── Twilio ──────────────────────────────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp-number=${TWILIO_WHATSAPP_NUMBER}
twilio.verify-service-sid=${TWILIO_VERIFY_SERVICE_SID}

# ── Gemini ──────────────────────────────────────────────────────────
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-1.5-flash
gemini.endpoint=https://generativelanguage.googleapis.com/v1/models
gemini.max-tokens=1024
gemini.temperature=0.1

# ── Shop Branding ───────────────────────────────────────────────────
shop.name=${SHOP_NAME:My Shop}
shop.address=${SHOP_ADDRESS:123 Main Street, City}
shop.phone=${SHOP_PHONE:+91-9876543210}
shop.gstin=${SHOP_GSTIN:27AAPFU0939F1ZV}

# ── PDF Hosting ─────────────────────────────────────────────────────
pdf.host-base-url=${PDF_HOST_BASE_URL:http://localhost:8080/invoices}

# ── Async Thread Pool ───────────────────────────────────────────────
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=omnishelf-async-

# ── Session Settings ────────────────────────────────────────────────
session.timeout-minutes=20
session.otp-brute-force-limit=5
session.otp-lockout-minutes=30

# ── Rate Limiting ───────────────────────────────────────────────────
ratelimit.burst-limit=20
ratelimit.burst-window-minutes=5
ratelimit.daily-limit=500

# ── Actuator (health checks) ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ─────────────────────────────────────────────────────────
logging.level.com.omnishelf=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId}] - %msg%n
