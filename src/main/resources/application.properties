spring.application.name=OmniShelf

# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/OminiSelf
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp-number=${TWILIO_WHATSAPP_NUMBER}

# Gemini
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-3.5-flash
gemini.endpoint=https://generativelanguage.googleapis.com/v1/models

# Shop branding — shown on every invoice
shop.name=${SHOP_NAME}
shop.address=${SHOP_ADDRESS}
shop.phone=${SHOP_PHONE}
shop.gstin=${SHOP_GSTIN}

# Where to temporarily host PDFs for Twilio to fetch
# Options: local file server, S3, or Cloudinary (free tier works)
pdf.host-base-url=${PDF_HOST_BASE_URL}